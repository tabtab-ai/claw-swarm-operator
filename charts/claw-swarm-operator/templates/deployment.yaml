apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claw-swarm-operator.fullname" . }}
  labels:
    {{- include "claw-swarm-operator.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "claw-swarm-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "claw-swarm-operator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "claw-swarm-operator.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
          - /manager
          args:
          - --runtime-image={{ .Values.operatorConfig.runtimeImage }}
          - --storage-class={{ .Values.operatorConfig.storageClass }}
          - --ingress-domain={{ .Values.operatorConfig.ingressDomain }}
          - --ingress-host-prefix={{ .Values.operatorConfig.ingressHostPrefix }}
          - --ingress-class-name={{ .Values.operatorConfig.ingressClassName }}
          - --ingress-tls-secret={{ .Values.operatorConfig.ingressTLSSecret }}
          - --namespace={{ .Release.Namespace }}
          - --pool-size={{ .Values.operatorConfig.poolSize }}
          - --image-pull-secrets={{ .Values.operatorConfig.imagePullSecrets }}
          - --request-cpu={{ .Values.operatorConfig.requestCPU}}
          - --request-memory={{ .Values.operatorConfig.requestMeory }}
          - --limit-cpu={{ .Values.operatorConfig.limitCPU }}
          - --limit-memory={{ .Values.operatorConfig.limitMemory }}
          - --leader-elect=true
          - --node-selector={{ .Values.operatorConfig.nodeSelector }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
